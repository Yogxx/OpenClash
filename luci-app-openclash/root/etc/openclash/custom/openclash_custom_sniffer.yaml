sniffer:
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    QUIC:
      ports: [ 443 ]
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
  force-domain:
#  - '+' # Force all domain to use sniffer
  - "+.netflix.com"
  - "+.nflxvideo.net"
  - "+.amazonaws.com"
  - "+.media.dssott.com"
  
  skip-domain:
  - Mijia Cloud
  - dlg.io.mi.com
  - +.oray.com
  - +.sunlogin.net
  - +.push.apple.com
  #- geosite:cn
  # skip-src-address:
  #   - 192.168.0.3/32
  # skip-dst-address:
  #   - 192.168.0.3/32
