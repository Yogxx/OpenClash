name: OpenClash Auto Release

on:
  push:
    branches: [ dev ]
    paths:
      - 'luci-app-openclash/Makefile'
  workflow_dispatch:

jobs:
  get_version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get Version
        id: ver
        run: |
          VER=$(grep 'PKG_VERSION:=' luci-app-openclash/Makefile | cut -d= -f2)
          echo "version=$VER" >> $GITHUB_OUTPUT

  build:
    runs-on: ubuntu-latest
    needs: get_version
    strategy:
      fail-fast: false
      matrix:
        type: [ ipk, apk ]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            curl git tar zstd unzip jq \
            python3 python3-pyelftools python3-setuptools

      - name: Download OpenWrt SDK (FIXED)
        run: |
          mkdir sdk && cd sdk
          if [ "${{ matrix.type }}" = "ipk" ]; then
            curl -L https://downloads.openwrt.org/releases/22.03.0/targets/x86/64/openwrt-sdk-22.03.0-x86-64_gcc-11.2.0_musl.Linux-x86_64.tar.xz \
              | tar xJ
            mv openwrt-sdk-* openwrt
          else
            BASE=https://downloads.openwrt.org/snapshots/targets/x86/64
            NAME=$(curl -s $BASE | grep -oE 'openwrt-sdk-x86-64[^"]+\.tar\.zst' | head -n1)
            echo "Using snapshot SDK: $NAME"
            curl -L "$BASE/$NAME" \
              | tar --use-compress-program=unzstd -x
            mv openwrt-sdk-* openwrt
          fi

      - name: Copy OpenClash source
        run: |
          cp -r luci-app-openclash sdk/openwrt/package/

      - name: Update OpenClash resources
        run: |
          BASE=sdk/openwrt/package/luci-app-openclash/root

          CHNR=$BASE/etc/openclash/china_ip_route.ipset
          CHNR6=$BASE/etc/openclash/china_ip6_route.ipset
          GEOSITE=$BASE/etc/openclash/GeoSite.dat
          MMDB=$BASE/etc/openclash/Country.mmdb
          ZASHBOARD=$BASE/usr/share/openclash/ui/zashboard
          METACUBEXD=$BASE/usr/share/openclash/ui/metacubexd

          mkdir -p tmp

          curl -sSL https://ispip.clang.cn/all_cn.txt -o tmp/china_ip_route.ipset
          curl -sSL https://ispip.clang.cn/all_cn_ipv6.txt -o tmp/china_ip6_route.ipset
          mkdir -p $(dirname $CHNR) $(dirname $CHNR6)
          cp tmp/china_ip_route.ipset $CHNR
          cp tmp/china_ip6_route.ipset $CHNR6

          curl -sSL https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip -o tmp/metacubexd.zip
          unzip -q tmp/metacubexd.zip -d tmp
          rm -rf $METACUBEXD && mkdir -p $METACUBEXD
          cp -r tmp/metacubexd-gh-pages/* $METACUBEXD

          curl -sSL https://github.com/Zephyruso/zashboard/releases/latest/download/dist-cdn-fonts.zip -o tmp/zashboard.zip
          unzip -q tmp/zashboard.zip -d tmp/zashboard
          rm -rf $ZASHBOARD && mkdir -p $ZASHBOARD
          cp -r tmp/zashboard/dist/* $ZASHBOARD

          TAG=$(curl -s https://api.github.com/repos/Loyalsoldier/v2ray-rules-dat/releases/latest | jq -r .tag_name)
          curl -sSL https://github.com/Loyalsoldier/v2ray-rules-dat/releases/download/$TAG/geosite.dat -o tmp/GeoSite.dat
          mkdir -p $(dirname $GEOSITE)
          cp tmp/GeoSite.dat $GEOSITE

          curl -sSL https://github.com/alecthw/mmdb_china_ip_list/releases/latest/download/Country-lite.mmdb -o tmp/Country.mmdb
          mkdir -p $(dirname $MMDB)
          cp tmp/Country.mmdb $MMDB

      - name: Compile po2lmo
        run: |
          cd sdk/openwrt/package/luci-app-openclash/tools/po2lmo
          make && sudo make install

      - name: Compile OpenClash
        run: |
          cd sdk/openwrt
          make defconfig
          make package/luci-app-openclash/compile -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclash-${{ matrix.type }}
          path: sdk/openwrt/bin/packages/**/luci-app-openclash*

  release:
    runs-on: ubuntu-latest
    needs: [ get_version, build ]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.get_version.outputs.version }}
          name: OpenClash v${{ needs.get_version.outputs.version }}
          files: |
            dist/**/luci-app-openclash_*.ipk
            dist/**/luci-app-openclash-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
