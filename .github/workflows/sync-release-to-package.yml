name: Sync Release to Package Branch

on:
  # Auto-run langsung setelah Workflow 1 selesai sukses
  # Lebih reliable untuk repo fork dibanding release: published
  workflow_run:
    workflows: ["OpenClash Auto Release"]
    types: [completed]

  workflow_dispatch:
    inputs:
      tag:
        description: "Tag release (kosong = pakai release terbaru)"
        required: false
        default: ""

permissions:
  contents: write

env:
  PKG_NAME: luci-app-openclash
  PACKAGE_BRANCH: package
  PACKAGE_DIR: master

jobs:
  sync:
    runs-on: ubuntu-latest
    # Jika dari workflow_run, hanya lanjut kalau upstream sukses
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout package branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.PACKAGE_BRANCH }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            # Untuk workflow_run atau workflow_dispatch tanpa input:
            # ambil release terbaru via API
            TAG=$(curl -s "https://api.github.com/repos/$REPO/releases/latest" \
              | jq -r .tag_name)
          fi

          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "❌ Gagal mendapatkan tag release"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "✅ Using tag: $TAG"

      - name: Download release assets
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          mkdir -p assets

          echo "📦 Fetching assets for tag: $TAG"

          curl -s "https://api.github.com/repos/$REPO/releases/tags/$TAG" \
            | jq -r '.assets[].browser_download_url' \
            | grep -E '\.(ipk|apk)$' \
            | while read -r url; do
                FILENAME=$(basename "$url")
                echo "⬇️  Downloading $FILENAME"
                curl -fsSL "$url" -o "assets/$FILENAME"
              done

          TOTAL=$(find assets -name "*.ipk" -o -name "*.apk" | wc -l)
          if [ "$TOTAL" -eq 0 ]; then
            echo "❌ Tidak ada asset IPK/APK ditemukan untuk tag $TAG"
            exit 1
          fi
          echo "✅ Total $TOTAL file diunduh"

      - name: Update package branch
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -e
          mkdir -p "${PACKAGE_DIR}"

          # Hapus versi lama
          rm -f "${PACKAGE_DIR}/${PKG_NAME}"_*.ipk
          rm -f "${PACKAGE_DIR}/${PKG_NAME}"-*.apk

          # Copy versi baru — find+cp agar tidak gagal jika salah satu ekstensi tidak ada
          find assets -name "*.ipk" -exec cp {} "${PACKAGE_DIR}/" \;
          find assets -name "*.apk" -exec cp {} "${PACKAGE_DIR}/" \;

          # Simpan versi aktif
          echo "$TAG" > "${PACKAGE_DIR}/version"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${PACKAGE_DIR}"
          git commit -m "sync: OpenClash ${TAG}" || echo "ℹ️  Tidak ada perubahan, skip commit"
          git push
          
